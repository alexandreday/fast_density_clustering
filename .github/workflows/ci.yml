name: CI

on:
  push:
    branches: [master, bring_to_date]
  pull_request:
    branches: [master]

jobs:
  # ── Tests with Rust extension ───────────────────────────────────────────
  test-rust:
    name: Test (Python ${{ matrix.python-version }}, Rust)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build and install with Rust extension
        run: |
          uv pip install --system maturin
          maturin build --release --out dist
          uv pip install --system dist/*.whl
          uv pip install --system pytest pytest-cov matplotlib mypy

      - name: Run tests
        run: pytest -v

  # ── Tests without Rust (pure-Python fallback) ───────────────────────────
  test-python-only:
    name: Test (Python ${{ matrix.python-version }}, pure-Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install fdc pure-Python (skip Rust build)
        run: |
          uv pip install --system numpy scikit-learn scipy matplotlib
          uv pip install --system pytest pytest-cov
          cd fdc && pip install --system --no-deps --no-build-isolation . || true
          python -c "import sys; sys.path.insert(0, '.'); from fdc import FDC; print('fdc imported')"

      - name: Run tests (excluding Rust-specific)
        run: pytest -v --ignore=tests/test_rust_backend.py

  # ── Type checking ───────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system numpy scikit-learn scipy mypy

      - name: Run mypy
        run: mypy
